<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Style Video Call</title>
    
    <script src="https://meet.jit.si/external_api.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b141a;
            color: #e9edef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* হোয়াটসঅ্যাপ স্টাইল মেইন কন্টেইনার */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #111b21;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        @media (min-width: 600px) {
            .app-container {
                height: 85vh;
                border-radius: 10px;
                border: 1px solid #2f3b43;
            }
        }

        /* হেডার সেকশন */
        .header {
            background-color: #202c33;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2f3b43;
            z-index: 5;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background-color: #00a884;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .user-info h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .user-info p {
            font-size: 13px;
            color: #8696a0;
        }

        /* মেইন স্ক্রিন এরিয়া */
        .main-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .room-input-box {
            width: 100%;
            background: #202c33;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #2f3b43;
        }

        .room-input-box h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #e9edef;
        }

        .room-input-box input {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2a3942;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        /* হোয়াটসঅ্যাপ গ্রিন বাটন */
        .btn-call {
            width: 100%;
            padding: 12px;
            border: none;
            background-color: #00a884;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-call:hover {
            background-color: #008f72;
        }

        /* ভিডিও ইন্টারফেস কন্টেইনার */
        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 10;
        }

        /* এরর বা নোটিশ মেসেজ স্টাইল */
        .error-message {
            color: #ff2e74;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="avatar">📞</div>
            <div class="user-info">
                <h3>WhatsApp Video (Jitsi)</h3>
                <p>কোনো অ্যাপ ছাড়া সরাসরি ভিডিও কল</p>
            </div>
        </div>

        <div class="main-screen" id="setup-screen">
            <div class="room-input-box">
                <h2>ভিডিও কল শুরু করুন</h2>
                <input type="text" id="room-name" placeholder="রুমের নাম লিখুন">
                <button class="btn-call" onclick="initiateCall()">কল করুন / জয়েন করুন</button>
                <div id="error-txt" class="error-message"></div>
            </div>
        </div>

        <div id="video-container"></div>
    </div>

    <script>
        // পেজ লোড হলে অটোমেটিক একটি ৫ অক্ষরের ইউনিক আইডি তৈরি হবে
        window.onload = function() {
            const randomId = Math.random().toString(36).substring(2, 7);
            document.getElementById('room-name').value = "wp-" + randomId;
            
            // Jitsi Script লোড হয়েছে কিনা চেক করা
            if (typeof JitsiMeetExternalAPI === 'undefined') {
                showError("Jitsi লাইব্রেরি লোড হতে পারেনি! আপনার ইন্টারনেট কানেকশন চেক করুন বা পেজটি রিফ্রেশ করুন।");
            }
        };

        function showError(msg) {
            const errDiv = document.getElementById('error-txt');
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
        }

        async function initiateCall() {
            const roomName = document.getElementById('room-name').value.trim();
            
            if (!roomName) {
                showError("দয়া করে একটি রুমের নাম লিখুন!");
                return;
            }

            // আধুনিক ব্রাউজারে ক্যামেরা ও মাইক্রোফোনের পারমিশন চেক করা
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            } catch (err) {
                console.error("Permission error:", err);
                showError("ক্যামেরা বা মাইক্রোফোনের পারমিশন পাওয়া যায়নি! ব্রাউজারের Lock (🔒) আইকনে ক্লিক করে পারমিশন Allow করে দিন।");
                alert("কল চালু করতে ক্যামেরা এবং মাইক্রোফোনের অনুমতি (Allow) প্রয়োজন!");
                return; 
            }

            // পারমিশন ঠিক থাকলে ভিডিও কন্টেইনার অন করা
            const videoContainer = document.getElementById('video-container');
            videoContainer.style.display = 'block';

            // Jitsi API কনফিগারেশন
            const domain = "meet.jit.si";
            const options = {
                roomName: roomName,
                width: '100%',
                height: '100%',
                parentNode: videoContainer,
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    prejoinPageEnabled: false,    // জয়েন করার আগের বাড়তি পেজ বন্ধ রাখা হলো
                    disableDeepLinking: true,     // মোবাইল অ্যাপে রিডাইরেক্ট করা সম্পূর্ণ বন্ধ (ব্রাউজারেই চলবে)
                    welcomePageEnabled: false
                },
                interfaceConfigOverwrite: {
                    MOBILE_APP_PROMO: false,      // অ্যাপ ডাউনলোডের ব্যানার দেখাবে না
                    SHOW_CHROME_EXTENSION_BANNER: false,
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'hangup', 'chat', 'tileview', 'toggle-camera'
                    ]
                }
            };

            try {
                // ভিডিও কল রান করা
                const api = new JitsiMeetExternalAPI(domain, options);

                // ইউজার লাল বাটন চেপে কল কেটে দিলে (Hangup) হোম স্ক্রিনে ব্যাক করা
                api.addEventListener('readyToClose', () => {
                    videoContainer.style.display = 'none';
                    videoContainer.innerHTML = ''; 
                    location.reload(); // নতুন কলের জন্য পেজ রিফ্রেশ
                });
            } catch (e) {
                showError("কল কানেক্ট করতে সমস্যা হচ্ছে। আবার চেষ্টা করুন।");
            }
        }
    </script>
</body>
</html>
