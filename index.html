<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you Jan</title>
    <style>
        /* =======================================================================
           1. CORE BASE ARCHITECTURE & RESET
           =======================================================================
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* পিচ ব্ল্যাক ব্যাকগ্রাউন্ড */
            font-family: 'Arial Black', 'Impact', sans-serif;
            cursor: pointer; /* টাচ/ক্লিক ইন্ডিকেটর */
        }

        /* মোশন ক্যানভাস স্টেজ */
        #motionStage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* স্থির টেক্সটের জন্য সেন্ট্রাল ডিসপ্লে স্টেজ */
        .center-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%; 
            padding: 0 15px;
            pointer-events: none; /* যাতে ক্যানভাসে টাচ ইভেন্ট সরাসরি পৌঁছায় */
        }
        
        .text-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* =======================================================================
           2. REALISTIC 3D NEON TEXT & SHIMMER ENGINE
           =======================================================================
        */
        
        /* ছবির মতো গভীর রয়্যাল ব্লু বডি এবং তীব্র সায়ান নিয়ন আউটলাইন */
        .main-neon-text {
            font-size: 5.5rem; 
            font-weight: 900;
            color: #1a5fff; 
            white-space: nowrap;
            letter-spacing: 6px;
            text-transform: uppercase;
            -webkit-text-stroke: 2.5px #00f3ff; 
            
            /* ৪ স্তরের রিয়েলিস্টিক নিয়ন শ্যাডো ও গ্লো */
            filter: drop-shadow(0 0 5px rgba(0, 243, 255, 0.9))
                    drop-shadow(0 0 15px rgba(0, 85, 255, 0.8))
                    drop-shadow(0 0 30px rgba(0, 85, 255, 0.6))
                    drop-shadow(0 0 60px rgba(0, 243, 255, 0.4));
            
            /* হালকা কাঁপুনি বা নিয়ন ফ্লিকারিং ভাইব দেওয়ার জন্য অ্যানিমেশন */
            animation: realisticNeonShimmer 4s infinite ease-in-out;
        }

        /* ওয়াটার রিফ্লেকশন টেক্সট (Mirror Effect) */
        .reflection-neon-text {
            font-size: 5.5rem;
            font-weight: 900;
            color: #1a5fff;
            white-space: nowrap;
            letter-spacing: 6px;
            text-transform: uppercase;
            -webkit-text-stroke: 2.5px #00f3ff;
            
            transform: scaleY(-1) translateY(-15px); 
            opacity: 0.30;
            
            /* রিফ্লেকশনের গ্লো আরও স্মুথ ও ঝাপসা */
            filter: blur(5px) 
                    drop-shadow(0 0 10px rgba(0, 85, 255, 0.8))
                    drop-shadow(0 0 25px rgba(0, 243, 255, 0.6));
            
            animation: realisticReflectionShimmer 4s infinite ease-in-out;
        }

        /* 📱 মোবাইল এবং ট্যাবলেটের জন্য অটো-ফিট মিডিয়া কোয়েরি */
        @media (max-width: 1024px) {
            .main-neon-text, .reflection-neon-text {
                font-size: 3.8rem;
                letter-spacing: 4px;
                -webkit-text-stroke: 1.8px #00f3ff;
            }
        }

        @media (max-width: 768px) {
            .main-neon-text, .reflection-neon-text {
                font-size: 2.4rem; 
                letter-spacing: 3px;
                -webkit-text-stroke: 1.2px #00f3ff;
            }
            .reflection-neon-text {
                transform: scaleY(-1) translateY(-5px); 
            }
        }

        @media (max-width: 400px) {
            .main-neon-text, .reflection-neon-text {
                font-size: 1.9rem;
                letter-spacing: 2px;
            }
        }

        /* রিয়েলিস্টিক নিয়ন গ্লো এর পালস ও শিমিং ইফেক্ট */
        @keyframes realisticNeonShimmer {
            0%, 100% { 
                transform: scale(0.97);
                filter: drop-shadow(0 0 5px rgba(0, 243, 255, 0.9)) drop-shadow(0 0 15px rgba(0, 85, 255, 0.8)) drop-shadow(0 0 40px rgba(0, 85, 255, 0.5));
            }
            50% { 
                transform: scale(1.02);
                filter: drop-shadow(0 0 8px rgba(0, 243, 255, 1)) drop-shadow(0 0 25px rgba(0, 85, 255, 0.9)) drop-shadow(0 0 55px rgba(0, 243, 255, 0.7));
            }
        }

        @keyframes realisticReflectionShimmer {
            0%, 100% { transform: scale(0.97) scaleY(-1) translateY(-15px); }
            50% { transform: scale(1.02) scaleY(-1) translateY(-15px); }
        }

        /* মোবাইলের রিফ্লেকশন কোঅর্ডিনেট অ্যানিমেশন */
        @media (max-width: 768px) {
            @keyframes realisticReflectionShimmer {
                0%, 100% { transform: scale(0.97) scaleY(-1) translateY(-5px); }
                50% { transform: scale(1.02) scaleY(-1) translateY(-5px); }
            }
        }
    </style>
</head>
<body>

    <!-- ইন্টারঅ্যাক্টিভ ব্যাকগ্রাউন্ড ক্যানভাস -->
    <canvas id="motionStage"></canvas>

    <!-- সেন্ট্রাল রিয়েলিস্টিক নিয়ন ডিসপ্লে -->
    <div class="center-stage">
        <div class="text-container">
            <div class="main-neon-text"><h3>I Love You💕 Jan</h3></div>
            <div class="reflection-neon-text">I Love You</div>
        </div>
    </div>

    <!-- =======================================================================
         3. DYNAMIC INTERACTIVE GRAPHICS ENGINE (JAVASCRIPT)
         =======================================================================
    -->
    <script>
        (function () {
            'use strict';

            const CONFIG = {
                ambientHeartCount: 20,            // ব্যাকগ্রাউন্ডে নরমাল ভাসমান লাভ বাবল
                interactiveHeartBurst: 6,         // প্রতি টাচ/ক্লিকে কয়টি নতুন লাভ তৈরি হবে
                speedYMin: 0.5,
                speedYMax: 1.5
            };

            const canvas = document.getElementById('motionStage');
            const ctx = canvas.getContext('2d');
            
            let wWidth = window.innerWidth;
            let wHeight = window.innerHeight;
            let heartParticles = [];

            function syncSize() {
                wWidth = window.innerWidth;
                wHeight = window.innerHeight;
                canvas.width = wWidth;
                canvas.height = wHeight;
            }
            window.addEventListener('resize', syncSize);
            syncSize();

            // =======================================================================
            // প্রফেশনাল নিয়ন পিঙ্ক/পার্পল হার্ট পার্টিকেল আর্কিটেকচার
            // =======================================================================
            class NeonHeartParticle {
                constructor(isInitial = false, customX = null, customY = null) {
                    this.reset(isInitial, customX, customY);
                }

                reset(isInitial = false, customX = null, customY = null) {
                    // যদি কাস্টম পজিশন দেওয়া থাকে (যেমন টাচ ইভেন্ট), তবে সেখান থেকে তৈরি হবে
                    if (customX !== null && customY !== null) {
                        this.x = customX + (Math.random() - 0.5) * 60; // লেখার এরিয়ার চারপাশ থেকে ছড়াবে
                        this.y = customY + (Math.random() - 0.5) * 20;
                        this.size = Math.random() * 20 + 12; // টাচ বাবলগুলো একটু কিউট ও ছোট সাইজের হবে
                        this.isInteractive = true;
                    } else {
                        // নরমাল ব্যাকগ্রাউন্ড বাবলস
                        this.x = Math.random() * wWidth;
                        this.y = isInitial ? Math.random() * wHeight : wHeight + Math.random() * 100 + 40;
                        this.size = wWidth < 768 ? (Math.random() * 16 + 10) : (Math.random() * 32 + 16);
                        this.isInteractive = false;
                    }

                    this.speedY = Math.random() * (CONFIG.speedYMax - CONFIG.speedYMin) + CONFIG.speedYMin;
                    // টাচ করা লাভগুলো একটু বেশি দুলবে (Wobble Effect)
                    this.speedX = (Math.random() - 0.5) * (this.isInteractive ? 0.8 : 0.3); 
                    this.opacity = Math.random() * 0.5 + 0.4;
                    this.wobbleSpeed = Math.random() * 0.05 + 0.01;
                    this.wobbleCount = Math.random() * Math.PI;
                }

                update() {
                    this.y -= this.speedY;
                    this.wobbleCount += this.wobbleSpeed;
                    this.x += Math.sin(this.wobbleCount) * this.speedX; // সাইন ওয়েভ মোশনে দুলবে

                    // স্ক্রিনের বাইরে গেলে বা অপাসিটি শেষ হলে রিমুভ বা রিসেট হবে
                    if (this.y < -50) {
                        if (this.isInteractive) {
                            // টাচ বাবলগুলো স্ক্রিনের বাইরে গেলে ধ্বংস হয়ে যাবে
                            return false; 
                        } else {
                            // রেগুলার বাবল আবার নিচে রি-স্পন হবে
                            this.reset(false);
                        }
                    }
                    return true;
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    
                    // রিয়েলিস্টিক নিয়ন পার্পল ব্লার শ্যাডো
                    ctx.shadowBlur = wWidth < 768 ? 15 : 25;
                    ctx.shadowColor = '#ff00aa';
                    ctx.fillStyle = 'rgba(220, 0, 140, 0.7)'; 

                    // নিখুঁত ম্যাথমেটিক্যাল হার্ট ড্রয়িং
                    ctx.beginPath();
                    let topCurveHeight = this.size * 0.3;
                    ctx.moveTo(this.x, this.y + topCurveHeight);
                    
                    ctx.bezierCurveTo(this.x, this.y, this.x - this.size / 2, this.y, this.x - this.size / 2, this.y + topCurveHeight);
                    ctx.bezierCurveTo(this.x - this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + (this.size + topCurveHeight) / 2, this.x, this.y + this.size);
                    
                    ctx.bezierCurveTo(this.x, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, this.y + (this.size + topCurveHeight) / 2, this.x + this.size / 2, topCurveHeight + this.y);
                    ctx.bezierCurveTo(this.x + this.size / 2, this.y, this.x, this.y, this.x, this.y + topCurveHeight);
                    
                    ctx.closePath();
                    ctx.fill();
                    
                    // উজ্জ্বল বর্ডার আউটলাইন স্ট্রোক
                    ctx.strokeStyle = 'rgba(255, 170, 240, 0.85)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.restore();
                }
            }

            // প্রাথমিক ব্যাকগ্রাউন্ড বাবল জেনারেশন
            for (let i = 0; i < CONFIG.ambientHeartCount; i++) {
                heartParticles.push(new NeonHeartParticle(true));
            }

            // =======================================================================
            // TOUCH & CLICK INTERACTION LOGIC (FROM TEXT POSITION)
            // =======================================================================
            function triggerHeartBurst() {
                // "I Love You" লেখাটি স্ক্রিনের ঠিক মাঝখানে অবস্থিত
                const targetX = wWidth / 2;
                const targetY = wHeight / 2 - 30; // লেখার ঠিক ওপরের পজিশন

                for (let i = 0; i < CONFIG.interactiveHeartBurst; i++) {
                    heartParticles.push(new NeonHeartParticle(false, targetX, targetY));
                }
            }

            // স্ক্রিনে যেকোনো জায়গায় ক্লিক বা টাচ করলে লেখার ওপর থেকে লাভ বের হবে
            window.addEventListener('mousedown', triggerHeartBurst);
            window.addEventListener('touchstart', function(e) {
                // মোবাইল স্ক্রলিং এর ডিফল্ট বিহেভিয়ার আটকানোর জন্য
                e.preventDefault(); 
                triggerHeartBurst();
            }, { passive: false });

            // =======================================================================
            // INFINITE 60FPS RENDERING ENGINE
            // =======================================================================
            function renderLoop() {
                ctx.clearRect(0, 0, wWidth, wHeight);

                // ফিল্টারিং লুপ (টাচ বাবলগুলো স্ক্রিনের বাইরে গেলে মেমোরি থেকে ডিলিট করে দেয়)
                heartParticles = heartParticles.filter(heart => {
                    const isActive = heart.update();
                    if (isActive) heart.draw();
                    return isActive;
                });

                requestAnimationFrame(renderLoop);
            }

            renderLoop();

        })();
    </script>
</body>
</html>
